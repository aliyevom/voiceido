# VoiceIDO: nginx (80) -> frontend (3000), /api -> backend (4000)
# Build and run: docker compose up -d --build
# Env: OPENROUTER_API_KEY; optional GCP_CREDENTIALS_PATH for key file.

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""   # same origin when behind nginx
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=4000
    volumes:
      - backend_uploads:/app/uploads
      - ./gcp-key.json:/app/gcp-key.json:ro
    restart: unless-stopped

volumes:
  backend_uploads: {}
