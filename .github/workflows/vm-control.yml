# VoiceIDO VM control: go-online (start VM + app), go-offline (stop VM for zero cost).
#
# Setup (pick one auth method):
#   A) Service account key (easiest): Add secret GCP_SA_KEY = full JSON key file contents.
#      SA needs roles/compute.instanceAdmin.v1 (or compute.instances.get, start, stop, use).
#   B) Workload Identity Federation: Add secrets GCP_WIF_PROVIDER and GCP_WIF_SERVICE_ACCOUNT.
#
#   Variables: GCP_PROJECT_ID. Optional: VM_NAME, VM_ZONE.
#   For go-online: secret OPENROUTER_API_KEY.

name: VoiceIDO VM Control

on:
  workflow_dispatch:
    inputs:
      action:
        description: "VM action"
        required: true
        type: choice
        options:
          - go-online
          - go-offline
        default: go-online

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  VM_NAME: ${{ vars.VM_NAME || 'voiceido-app' }}
  VM_ZONE: ${{ vars.VM_ZONE || 'us-central1-a' }}

jobs:
  vm-control:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (SA key)
        if: vars.USE_WIF != 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Authenticate to Google Cloud (WIF)
        if: vars.USE_WIF == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}
          access_token_lifetime: 3600s
          access_token_scopes: https://www.googleapis.com/auth/cloud-platform

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Determine action
        id: decide
        run: echo "action=${{ inputs.action }}" >> "$GITHUB_OUTPUT"

      - name: Go offline
        if: steps.decide.outputs.action == 'go-offline'
        env:
          PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          VM_NAME: ${{ env.VM_NAME }}
          ZONE: ${{ env.VM_ZONE }}
          STOP_VM: "true"
        run: |
          chmod +x deploy/deploy.sh
          ./deploy/deploy.sh offline

      - name: Go online
        if: steps.decide.outputs.action == 'go-online'
        env:
          PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          VM_NAME: ${{ env.VM_NAME }}
          ZONE: ${{ env.VM_ZONE }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF: ${{ github.ref }}
          DEPLOY_CODE: "true"
        run: |
          chmod +x deploy/deploy.sh
          ./deploy/deploy.sh online

      - name: VM status
        if: always()
        env:
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          VM_NAME: ${{ env.VM_NAME }}
          VM_ZONE: ${{ env.VM_ZONE }}
        run: |
          gcloud compute instances describe "$VM_NAME" \
            --zone="$VM_ZONE" \
            --project="$GCP_PROJECT_ID" \
            --format="table(name,status,networkInterfaces[0].accessConfigs[0].natIP:label=EXTERNAL_IP)" 2>/dev/null || echo "VM not accessible"

      - name: Container status
        if: always() && steps.decide.outputs.action == 'go-online'
        env:
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          VM_NAME: ${{ env.VM_NAME }}
          VM_ZONE: ${{ env.VM_ZONE }}
        run: |
          gcloud compute ssh "$VM_NAME" --zone="$VM_ZONE" --project="$GCP_PROJECT_ID" --quiet \
            --command="cd ~/voiceido && sudo docker compose ps 2>&1" 2>/dev/null || echo "Could not get container status"
